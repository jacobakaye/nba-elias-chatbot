name: Update Elias File

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install requests

      - name: Run script
        run: python scripts/build_master_file.py

      - name: Commit new file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/nba_elias_gamehigh_master.txt
          git commit -m "Update Elias file" || echo "No changes"
          git push
